version: "3.9"

services:
  postgres:
    image: docker.io/library/postgres:16
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: mydb
    volumes:
      - /var/lib/postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  mongo:
    image: docker.io/library/mongo:latest
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin
    volumes:
      - /var/lib/mongo-data:/data/db
    ports:
      - "27017:27017"

  valkey:
    image: docker.io/library/valkey:latest
    volumes:
      - /var/lib/valkey-data:/data
    ports:
      - "6379:6379"

  grafana:
    image: docker.io/grafana/grafana:latest
    volumes:
      - /var/lib/grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"

  prometheus:
    image: docker.io/prom/prometheus:latest
    volumes:
      - /srv/prometheus-config:/etc/prometheus
    ports:
      - "9090:9090"

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: secret
    volumes:
      - /var/lib/keycloak-data:/opt/keycloak/data
    ports:
      - "8080:8080"

  kong:
    image: docker.io/library/kong:latest
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: host.docker.internal
      KONG_PG_USER: admin
      KONG_PG_PASSWORD: secret
    volumes:
      - /srv/kong-config:/etc/kong
    ports:
      - "8000:8000"
      - "8443:8443"

  rabbitmq:
    image: docker.io/library/rabbitmq:3-management
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
    volumes:
      - /var/lib/rabbitmq-data:/var/lib/rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"

  minio:
    image: docker.io/minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: secret123
    volumes:
      - /var/lib/minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  portainer:
    image: docker.io/portainer/portainer-ce:latest
    volumes:
      - /var/lib/portainer-data:/data
      - /var/run/podman/podman.sock:/var/run/docker.sock
    ports:
      - "9443:9443"

  nginx:
    image: docker.io/library/nginx:latest
    volumes:
      - /srv/nginx-html:/usr/share/nginx/html:ro
      - /srv/nginx-conf:/etc/nginx/conf.d
    ports:
      - "80:80"
      - "443:443"

  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - /var/lib/qdrant-data:/qdrant/storage
    ports:
      - "6333:6333"
      - "6334:6334"

  dbeaver:
    image: dbeaver/cloudbeaver:latest
    volumes:
      - /var/lib/dbeaver-data:/data
    ports:
      - "8978:8978"

  nats:
    image: docker.io/library/nats:latest
    command: -js
    volumes:
      - /var/lib/nats-data:/data
    ports:
      - "4222:4222"
      - "8222:8222"

  openbao:
    image: ghcr.io/openbao/openbao:latest
    volumes:
      - /var/lib/openbao-data:/data
    ports:
      - "8200:8200"

  ldap:
    image: osixia/openldap:latest
    environment:
      LDAP_ORGANISATION: "MyOrg"
      LDAP_DOMAIN: "myorg.local"
      LDAP_ADMIN_PASSWORD: secret
    volumes:
      - /var/lib/ldap-data:/var/lib/ldap
    ports:
      - "389:389"
      - "636:636"

